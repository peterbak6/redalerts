name: Fetch & Deploy Alerts

on:
  schedule:
    # Runs every 3 hours during Israeli daytime (05:00–20:00 UTC = 07:00–22:00 IST)
    - cron: "0 5,8,11,14,17,20 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest alerts
        if: github.event_name != 'push'
        run: npm run fetch-alerts

      - name: Check for new data
        id: diff
        if: github.event_name != 'push'
        run: |
          git diff --quiet public/red-alert/ || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit updated data
        if: github.event_name != 'push' && steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add public/red-alert/
          git commit -m "chore: update red-alert data [$(date -u +%Y-%m-%d)]"
          git push

      - name: Build
        if: github.event_name == 'push' || steps.diff.outputs.changed == 'true'
        run: npm run build

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' || steps.diff.outputs.changed == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
